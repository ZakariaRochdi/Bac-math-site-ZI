      <h2 class="interactive-title" id="ev-title">📄 <span>Exercise</span></h2>
      <p class="interactive-message" style="color: rgb(0, 0, 255);" id="ev-desc"></p>

        <iframe id="pdf-frame" title="PDF" style="width: 100%; height: 85vh; border: none;" allowfullscreen></iframe>
        <embed id="pdf-embed" type="application/pdf" style="display: none; width: 100%; height: 85vh;" />
      </div>
      <p id="pdf-fallback-hint" class="interactive-message" style="display: none; max-width: 640px; margin: 16px auto;">
        Avec <code>file://</code>, utilisez <strong>Live Server</strong> ou
        <a class="button" id="pdf-open-tab" href="#" target="_blank" rel="noopener" style="display: inline-block; margin-top: 8px;">ouvrir le PDF</a>
      </p>
      <div style="margin-top: 20px;">
        <a class="button" id="back-series" href="exercices-list.html">⬅️ Back to series</a>
        <a class="button" id="pdf-dl" href="#">⬇️ Save PDF</a>

  <script src="js/cours-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="js/particles-init.js"></script>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var coursId = parseInt(p.get('coursId'), 10);
      var n = parseInt(p.get('n'), 10);
      var cours = window.BACMATH_COURS.find(function (c) { return c.id === coursId; });
      if (!cours || !n || n < 1) {
        document.getElementById('ev-desc').textContent = 'Lien incomplet.';
        return;
      }

      // ✅ Correction : utiliser cours.nom au lieu de coursId
      var url = 'exercices/' + encodeURIComponent(cours.nom) + '/' + encodeURIComponent('Série ' + n) + '.pdf';

      var labelSerie = 'Série ' + n;
      document.getElementById('ev-title').innerHTML =
        '📄 <span>' + cours.nom + ' — ' + labelSerie + '</span>';
      document.getElementById('ev-desc').innerHTML =
        '✨ Vous pouvez visualiser le sujet <strong>' +
        cours.nom +
        ' – ' +
        labelSerie +
        '</strong> directement ci-dessous et le télécharger :';
      var frame = document.getElementById('pdf-frame');
      var embed = document.getElementById('pdf-embed');
      frame.src = url;
      document.getElementById('pdf-open-tab').href = url;
      if (location.protocol === 'file:') {
        embed.src = url;
        embed.style.display = 'block';
        frame.style.display = 'none';
        document.getElementById('pdf-fallback-hint').style.display = 'block';
      }
      var dl = document.getElementById('pdf-dl');
      dl.href = url;
      document.getElementById('back-series').href = 'exercices-list.html?id=' + coursId;
    })();
    function openFullScreen() {
      var frame = document.getElementById('pdf-frame');
      var embed = document.getElementById('pdf-embed');
      var el = frame.style.display === 'none' ? embed : frame;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }
  </script>
</body>
