      justify-content: space-between;
      align-items: center;
      transition: transform 0.3s ease, background 0.3s ease;

    .exam-item:hover {

  <script>
    (function () {
      var ul = document.getElementById('exam-ul');
      window.BACMATH_EXAMENS.forEach(function (e) {

        var cap = y.charAt(0).toUpperCase() + y.slice(1);

        li.className = 'exam-item';
        li.innerHTML =

          cap +
